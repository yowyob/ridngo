services:
  # 1. Base de données PostgreSQL
  postgres:
    image: postgres:16
    container_name: ride-go-db
    environment:
      POSTGRES_DB: yowyob_db
      POSTGRES_USER: fleet_admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_admin -d yowyob_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Cache Redis pour le tracking GPS
  redis:
    image: redis:alpine
    container_name: ride-go-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}

  # 3. Kafka (Redpanda) pour les notifications
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ride-go-kafka
    ports:
      - "9092:9092"
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr plaintext://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr plaintext://redpanda:29092,external://localhost:9092

  # 4. Application Backend Spring Boot
  backend:
    dns:
      - 8.8.8.8
      - 8.8.4.4

    image: ridngo-backend
    container_name: ridngo-main-backend-1
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      # Base de données
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: yowyob_db
      DB_SCHEMA: ride_and_go
      DB_USERNAME: fleet_admin
      DB_PASSWORD: ${DB_PASSWORD}
      DB_LIQUIBASE_USERNAME: fleet_admin
      DB_LIQUIBASE_PASSWORD: ${DB_PASSWORD}

      # Cache Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Broker Kafka (Redpanda)
      KAFKA_HOST: redpanda
      KAFKA_PORT: 29092
      KAFKA_BACKEND_USER: backend
      KAFKA_BACKEND_PASSWORD: ${KAFKA_BACKEND_PASSWORD}

      # Services tiers & Emails
      NOTIFICATION_SERVICE_TOKEN: ${NOTIFICATION_SERVICE_TOKEN}
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      KERNEL_CLIENT_ID: ${KERNEL_CLIENT_ID}
      KERNEL_API_KEY: ${KERNEL_API_KEY}
      APPLICATION_KERNEL_TENANT_ID: ${APPLICATION_KERNEL_TENANT_ID}
      FARE_API_KEY: ${FARE_API_KEY}

volumes:
  postgres_data: