services:
  # 1. Base de données PostgreSQL
  postgres:
    image: postgres:16
    container_name: ride-go-db

    environment:
      POSTGRES_DB: yowyob_db
      POSTGRES_USER: fleet_admin
      POSTGRES_PASSWORD: fleet_password

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fleet_admin -d yowyob_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Cache Redis pour le tracking GPS
  redis:
    image: redis:alpine
    container_name: ride-go-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass password

  # 3. Kafka (Redpanda) pour les notifications
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: ride-go-kafka
    ports:
      - "9092:9092"
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr plaintext://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr plaintext://redpanda:29092,external://localhost:9092

  backend:

    image: ridngo-backend

    depends_on:
      postgres:
        condition: service_healthy

    environment:

      SPRING_PROFILES_ACTIVE: prod

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: yowyob_db
      DB_SCHEMA: ride_and_go

      DB_USERNAME: fleet_admin
      DB_PASSWORD: fleet_password

      DB_LIQUIBASE_USERNAME: fleet_admin
      DB_LIQUIBASE_PASSWORD: fleet_password

      REDIS_USERNAME: ""
      REDIS_PASSWORD: password

      KAFKA_HOST: redpanda
      KAFKA_PORT: 29092

      KAFKA_BACKEND_USER: backend
      KAFKA_BACKEND_PASSWORD: backend123

      NOTIFICATION_SERVICE_TOKEN: ton-token

      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: tonmail@gmail.com
      SMTP_PASSWORD: tonpassword

volumes:
  postgres_data: