# ===================================================================
# PRODUCTION CONFIGURATION - RIDE & GO API
# ===================================================================

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-message: always

spring:
  application:
    name: ride-and-go

  # ------------------------------------------------------------------
  # DATABASE — Liquibase
  # ------------------------------------------------------------------
  liquibase:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
    user: ${DB_LIQUIBASE_USERNAME}
    password: ${DB_LIQUIBASE_PASSWORD}
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${DB_SCHEMA}
    liquibase-schema: ${DB_SCHEMA}

  # ------------------------------------------------------------------
  # DATABASE — Datasource JDBC
  # ------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?currentSchema=${DB_SCHEMA}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # ------------------------------------------------------------------
  # DATABASE — R2DBC réactif
  # ------------------------------------------------------------------
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?schema=${DB_SCHEMA}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  sql:
    init:
      mode: never

  # ------------------------------------------------------------------
  # REDIS CLUSTER
  # ------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}

  # ------------------------------------------------------------------
  # KAFKA — Connexion sécurisée SASL/SCRAM-SHA-256
  # ------------------------------------------------------------------
  kafka:
    bootstrap-servers: ${KAFKA_HOST}:${KAFKA_PORT:29092}

    # ── Consumer ────────────────────────────────────────────────────
    consumer:
      # Convention : yowyob.{service}-group  (doit matcher le préfixe ACL yowyob.)
      group-id: yowyob.ride-and-go-group
      auto-offset-reset: earliest
      enable-auto-commit: false          # commit manuel = fiabilité garantie
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 50
      properties:
        # Restreindre les packages désérialisables (ne jamais laisser "*" en prod)
        spring.json.trusted.packages: "com.yowyob.rideandgo.*,com.yowyob.shared.*"
        isolation.level: read_committed

    # ── Producer ────────────────────────────────────────────────────
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # acks=all : le broker confirme l'écriture sur toutes les répliques
      # Sur single-broker (réplication=1) cela équivaut à acks=1,
      # mais le paramètre est déjà correct pour la future migration multi-broker
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        compression.type: lz4

    # ── Listener container ──────────────────────────────────────────
    listener:
      ack-mode: MANUAL_IMMEDIATE
      # 3 threads = 3 partitions consommées en parallèle par instance
      # À ajuster si le topic ride-and-go a plus de 6 partitions
      concurrency: 3
      missing-topics-fatal: false   # false = le service démarre même si le topic n'existe pas encore

# ------------------------------------------------------------------
# CUSTOM BUSINESS SERVICES CONFIGURATION
# ------------------------------------------------------------------
application:

  auth:
    mode: remote
    url: https://traefikdev.yowyob.com/auth

  fare:
    mode: remote
    url: https://traefikdev.yowyob.com/fare-calculator
    api-key: 974e9428-6ce2-48e7-b74b-93f572007ef8

  notification:
    mode: http
    url: https://traefikdev.yowyob.com/notification
    service-token: ${NOTIFICATION_SERVICE_TOKEN}
    templates:
      new-offer: 12
      driver-applied: 13
      driver-selected: 14
      ride-confirmed: 15
      ride-cancelled: 16
      admin-validation: 17

  vehicle:
    url: https://traefikdev.yowyob.com/vehicule

  syndicate:
    url: https://traefikdev.yowyob.com/ugate

  payment:
    url: 
    commission-rate: 0.10

  kafka:
    # ── Topics — État actuel : PAS ENCORE CRÉÉS ─────────────────────
    #
    # IMPORTANT : missing-topics-fatal=false (configuré ci-dessus) permet
    # au service de démarrer normalement même si ces topics sont absents.
    # Les @KafkaListener annotés sur ces topics resteront inactifs jusqu'à
    # la création du topic, puis s'activeront automatiquement au prochain
    # rebalance du consumer group (sans redémarrage du service).
    #
    # Nommage : convention yowyob.{service}.{entité}.{action}
    # Les topics doivent être créés par le DevOps via create-topic.sh
    # avant que les producers/consumers soient actifs en prod.
    #
    # ── Quand les topics seront créés, lancer ces commandes : ────────
    #
    #   ./create-topic.sh yowyob.ride.trip.requested          12  168
    #   ./create-topic.sh yowyob.ride.trip.started            12  168
    #   ./create-topic.sh yowyob.ride.trip.completed          12  720
    #   ./create-topic.sh yowyob.ride.trip.cancelled           6  168
    #   ./create-topic.sh yowyob.ride.offer.created            6  168
    #   ./create-topic.sh yowyob.notification.send.requested   6   24
    #   ./create-topic.sh yowyob.ride.trip.requested.DLT       3 2160
    #   ./create-topic.sh yowyob.ride.offer.created.DLT        3 2160
    #
    topics:
      # Topic reçu du service notification pour les tokens de session
      notification-token: yowyob.notification.token.issued

      # Topics émis par ride-and-go vers notification-service
      notification-send: yowyob.notification.send.requested

      # Topics métier ride-and-go
      offer-created: yowyob.ride.offer.created
      trip-requested: yowyob.ride.trip.requested
      trip-started: yowyob.ride.trip.started
      trip-completed: yowyob.ride.trip.completed
      trip-cancelled: yowyob.ride.trip.cancelled

      # Dead Letter Topics — messages en erreur après épuisement des retries
      offer-created-dlt: yowyob.ride.offer.created.DLT
      trip-requested-dlt: yowyob.ride.trip.requested.DLT

    notification-registration:
      name: "Ride and Go"
      email:
        host: ${SMTP_HOST:smtp.gmail.com}
        port: ${SMTP_PORT:587}
        username: ${SMTP_USERNAME}
        password: ${SMTP_PASSWORD}

    notification-service:
      template:
        new-offer-id: 1001
        accepted-offer-id: 1002

# ------------------------------------------------------------------
# MONITORING & HEALTH CHECK (ACTUATOR)
# ------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: ["health", "info", "prometheus"]
  endpoint:
    health:
      show-details: "always"
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# ------------------------------------------------------------------
# RESILIENCE4J
# ------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    instances:
      fare-calculator-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 100s
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 10
      auth-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 5s
        slidingWindowSize: 5
  timelimiter:
    instances:
      fare-calculator-service:
        timeoutDuration: 100s
      auth-service:
        timeoutDuration: 20s
